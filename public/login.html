<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduGest — Iniciar Sesión</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <!-- Background texture layer -->
  <div class="auth-dots"></div>

  <div class="auth-container">
    <div class="auth-card">

      <!-- Header -->
      <div class="auth-header">
        <div class="auth-logo">
          <img src="images/logo.png" alt="EduGest" />
        </div>
        <p>Innovación Escolar y Gestión</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Iniciar Sesión</button>
        <button class="tab-btn" data-tab="registro">Crear Cuenta</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active">
        <div class="form-group">
          <label for="loginEmail">Correo electrónico</label>
          <input type="email" id="loginEmail" placeholder="correo@ejemplo.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="loginPassword">Contraseña</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Iniciar Sesión</button>
        <div id="loginError" class="alert alert-error hidden"></div>
      </form>

      <!-- Registro Form -->
      <form id="registroForm" class="auth-form">
        <div class="form-group">
          <label for="regNombre">Nombre completo</label>
          <input type="text" id="regNombre" placeholder="Tu nombre completo" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="regEmail">Correo electrónico</label>
          <input type="email" id="regEmail" placeholder="correo@ejemplo.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="regPassword">Contraseña</label>
          <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Crear cuenta</button>
        <div id="regMessage" class="alert hidden"></div>
      </form>

    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
