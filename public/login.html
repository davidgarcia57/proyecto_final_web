<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forge &amp; Pixel — Acceso</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card">

      <div class="auth-header">
        <div class="auth-brand">
          <span class="brand-forge">FORGE</span>
          <span class="brand-amp"> &amp; </span>
          <span class="brand-pixel">PIXEL</span>
        </div>
        <p class="auth-subtitle">Marketplace de Pixel Art</p>
      </div>

      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Iniciar Sesion</button>
        <button class="tab-btn" data-tab="registro">Crear Cuenta</button>
      </div>

      <!-- Formulario de inicio de sesion -->
      <form id="loginForm" class="auth-form active">
        <div class="form-group">
          <label for="loginEmail">Correo electronico</label>
          <input type="email" id="loginEmail" class="form-control"
            placeholder="correo@ejemplo.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="loginPassword">Contrasena</label>
          <input type="password" id="loginPassword" class="form-control"
            placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          Iniciar Sesion
        </button>
        <div id="loginError" class="alert alert-error hidden"></div>
      </form>

      <!-- Formulario de registro -->
      <form id="registroForm" class="auth-form">
        <div class="form-group">
          <label for="regNombre">Nombre completo</label>
          <input type="text" id="regNombre" class="form-control"
            placeholder="Tu nombre" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="regEmail">Correo electronico</label>
          <input type="email" id="regEmail" class="form-control"
            placeholder="correo@ejemplo.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="regPassword">Contrasena</label>
          <input type="password" id="regPassword" class="form-control"
            placeholder="Minimo 6 caracteres" required autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label>Tipo de cuenta</label>
          <div class="role-selector">
            <button type="button" class="role-btn active" data-rol="comprador">
              Comprador
            </button>
            <button type="button" class="role-btn" data-rol="artista">
              Artista
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="regBtn">
          Crear Cuenta
        </button>
        <div id="regMessage" class="alert hidden"></div>
      </form>

    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
