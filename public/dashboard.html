<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forge &amp; Pixel — Panel</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);">
  <p style="font-family:var(--font-pixel);color:var(--muted);letter-spacing:0.08em;">Cargando...</p>
  <script src="js/api.js"></script>
  <script>
    (async () => {
      const r = await Api.sesion();
      if (!r || !r.data.autenticado) { window.location.href = '/login.html'; return; }
      window.location.href = r.data.usuario.rol === 'artista'
        ? '/artista-dashboard.html'
        : '/comprador-dashboard.html';
    })();
  </script>
</body>
</html>
