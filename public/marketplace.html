<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forge &amp; Pixel — Marketplace</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="app-loading">

  <div class="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <img src="/images/logo_forge.png" alt="Forge and Pixel" style="height:32px;width:auto;object-fit:contain;flex-shrink:0;" />
        <span class="sidebar-logo-text">
          <span class="brand-forge">F</span><span class="brand-amp">&amp;</span><span class="brand-pixel">P</span>
        </span>
      </div>
      <nav class="sidebar-nav">
        <span class="sidebar-label">Menú principal</span>
        <a href="/dashboard.html" class="sidebar-item">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Panel
        </a>
        <a href="/marketplace.html" class="sidebar-item active">
          <svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Marketplace
        </a>
        <a href="/vallecardo.html" class="sidebar-item">
          <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4M8 10v4"/><circle cx="15" cy="12" r="1"/><circle cx="18" cy="10" r="1"/><circle cx="18" cy="14" r="1"/></svg>
          Vallecardo
        </a>
        <a href="/pedidos.html" class="sidebar-item">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Pedidos
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="sidebar-logout" id="logoutBtn">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Cerrar Sesión
        </button>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="page-wrapper">

      <header class="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle" id="sidebarToggle" aria-label="Abrir menu">
            <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="topbar-brand">
            <span class="brand-forge">F</span><span class="brand-amp">&amp;</span><span class="brand-pixel">P</span>
          </div>
        </div>
        <div class="topbar-right">
          <div class="topbar-user">
            <div class="topbar-avatar" id="topbarAvatar">?</div>
            <span class="topbar-user-name" id="topbarName">—</span>
          </div>
          <button class="topbar-icon-btn settings-btn" id="settingsBtn" title="Ajustes">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </header>

      <main class="container">

        <div class="page-header">
          <h1>Marketplace</h1>
          <p>Servicios de pixel art disponibles en la plataforma</p>
        </div>

        <div class="actions-bar">
          <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-estilo="todos">Todos</button>
            <button class="filter-btn" data-estilo="Pixel Art">Pixel Art</button>
            <button class="filter-btn" data-estilo="Ilustracion">Ilustración</button>
            <button class="filter-btn" data-estilo="Concept Art">Concept Art</button>
            <button class="filter-btn" data-estilo="Animacion">Animación</button>
            <button class="filter-btn" data-estilo="Personajes">Personajes</button>
            <button class="filter-btn" data-estilo="Fondos">Fondos</button>
          </div>
          <button class="btn btn-primary" id="btnNuevoServicio">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nuevo Servicio
          </button>
        </div>

        <div id="serviciosGrid" class="services-grid">
          <!-- Tarjetas generadas por JS -->
        </div>

        <div id="emptyServicios" class="empty-state hidden">
          <svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <strong>Sin servicios disponibles</strong>
          <p>Agrega el primer servicio al marketplace.</p>
        </div>

      </main>
    </div>

  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden" role="alert"></div>

  <!-- Modal: crear / editar servicio -->
  <div id="modalServicio" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalServicioTitulo">Nuevo Servicio</h2>
        <button class="modal-close" id="modalServicioClose">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="servicioId" />
        <div class="form-group">
          <label for="servicioTitulo">Titulo del servicio</label>
          <input type="text" id="servicioTitulo" class="form-control"
            placeholder="Ej: Diseno de personaje pixel art 32x32" required />
        </div>
        <div class="form-group">
          <label for="servicioDesc">Descripcion</label>
          <textarea id="servicioDesc" class="form-control"
            placeholder="Describe el servicio, lo que incluye, tiempos de entrega..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="servicioPrecio">Precio (MXN)</label>
            <input type="number" id="servicioPrecio" class="form-control"
              placeholder="500.00" min="0" step="0.01" required />
          </div>
          <div class="form-group">
            <label for="servicioEstilo">Estilo</label>
            <select id="servicioEstilo" class="form-control">
              <option value="Pixel Art">Pixel Art</option>
              <option value="Ilustracion">Ilustración</option>
              <option value="Concept Art">Concept Art</option>
              <option value="Animacion">Animación</option>
              <option value="Personajes">Personajes</option>
              <option value="Fondos">Fondos</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="servicioPreview">Vista previa (JPG, PNG, GIF, WEBP — opcional)</label>
          <input type="file" id="servicioPreview" class="form-control form-file"
            accept=".jpg,.jpeg,.png,.gif,.webp" />
          <p class="form-hint" id="servicioPreviewHint" style="display:none;"></p>
        </div>
        <div class="form-group">
          <label for="servicioArchivo">Archivo descargable (.aseprite, .psd, .zip, etc. — opcional)</label>
          <input type="file" id="servicioArchivo" class="form-control form-file" />
          <p class="form-hint" id="servicioArchivoHint" style="display:none;"></p>
        </div>
        <div class="form-group" id="estadoGroup" style="display:none;">
          <label for="servicioEstado">Estado</label>
          <select id="servicioEstado" class="form-control">
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modalServicioCancelar">Cancelar</button>
        <button class="btn btn-primary" id="modalServicioGuardar">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal: contratar servicio -->
  <div id="modalContratar" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Contratar Servicio</h2>
        <button class="modal-close" id="modalContratarClose">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="contratarServicioId" />
        <div class="form-group">
          <label>Servicio</label>
          <p id="contratarNombre" style="font-family:var(--font-mono);color:var(--cyan);margin:0.25rem 0 0;"></p>
        </div>
        <div class="form-group">
          <label for="contratarMonto">Monto acordado (MXN) <span style="color:var(--rose);">*</span></label>
          <input type="number" id="contratarMonto" class="form-control"
            placeholder="500.00" min="0" step="0.01" required />
        </div>
        <div class="form-group">
          <label for="contratarNotas">Notas para el artista</label>
          <textarea id="contratarNotas" class="form-control"
            placeholder="Detalles del encargo, referencias, fechas de entrega..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modalContratarCancelar">Cancelar</button>
        <button class="btn btn-primary" id="modalContratarGuardar">Enviar Pedido</button>
      </div>
    </div>
  </div>

  <!-- Panel de ajustes -->
  <div id="settingsOverlay" class="settings-overlay"></div>
  <aside id="settingsPanel" class="settings-panel">
    <div class="settings-header">
      <h2>Ajustes</h2>
      <button id="closeSettings" class="settings-close">&times;</button>
    </div>
    <div class="settings-body">
      <div>
        <p class="settings-section-label">Mi perfil</p>
        <div class="settings-profile-card">
          <div class="settings-avatar-lg" id="settingsAvatar">?</div>
          <div>
            <span class="settings-user-name"  id="settingsName">—</span>
            <span class="settings-user-email" id="settingsEmail">—</span>
            <span class="settings-user-badge">
              <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              Activo
            </span>
          </div>
        </div>
      </div>
      <div>
        <p class="settings-section-label">Apariencia</p>
        <div class="theme-options">
          <button class="theme-btn" data-theme-val="system">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
            Sistema
          </button>
          <button class="theme-btn" data-theme-val="light">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>
            Claro
          </button>
          <button class="theme-btn" data-theme-val="dark">
            <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            Oscuro
          </button>
        </div>
      </div>
    </div>
  </aside>

  <script src="js/api.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/marketplace-app.js"></script>

</body>
</html>
